version: "2"

sql:
  - engine: postgresql
    queries: internal/db/queries
    schema:  internal/db/migrations
    gen:
      go:
        package:        sqlc
        out:            internal/db/sqlc
        sql_package:    pgx/v5
        emit_interface: true
        emit_json_tags: false
        emit_pointers_for_null_types: false
        emit_db_tags:   false
